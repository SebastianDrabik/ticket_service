services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket_service-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ticket_service
      POSTGRES_USER: ticket_service
      POSTGRES_PASSWORD: 'ticket_service!2026#Db9Xy'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ticket_service -d ticket_service']
      interval: 5s
      timeout: 5s
      retries: 5

  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket_service-website
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DATABASE_URL: 'postgresql://ticket_service:ticket_service%212026%23Db9Xy@postgres:5432/ticket_service'
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - website-node_modules:/app/node_modules

  pgadmin:
    image: dpage/pgadmin4:9.15
    container_name: ticket_service-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: 'pgadmin@example.net'
      PGADMIN_DEFAULT_PASSWORD: 'tickeets3rvice-Db9Xy-202'
      PGADMIN_DISABLE_POSTFIX: '1'
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  postgres-data:
  website-node_modules:
  pgadmin-data: